services:
  gundua:
    build:
      context: .
      dockerfile: Dockerfile
      # Build over the HOST network so apt-get uses the host's working resolver
      # (Docker's bridge DNS is broken on this server). Runtime still uses the
      # bridge + port mapping below — do NOT host-network the running container
      # or Apache:80 would collide with Nginx Proxy Manager.
      network: host
    image: gundua-aio:latest
    container_name: gundua_aio
    restart: unless-stopped
    # Host networking: no bridge subnet is allocated (avoids "address pools fully
    # subnetted"), and no clash with Webuzo. Apache serves host:5053 directly
    # (set in the Dockerfile); MariaDB listens on 127.0.0.1:5054 only.
    network_mode: host
    environment:
      # --- DB bootstrap (used by the entrypoint to create the DB + user) ---
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # --- WordPress connects to the in-container DB over localhost:5054 ---
      WORDPRESS_DB_HOST: 127.0.0.1:5054
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      # MUST match $table_prefix from the old wp-config.php (often NOT plain wp_)
      WORDPRESS_TABLE_PREFIX: ${TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${SITE_URL}');
        define('WP_SITEURL', '${SITE_URL}');
    volumes:
      - db_data:/var/lib/mysql                          # persistent database
      - ./backup/wp-content:/var/www/html/wp-content    # themes/plugins/uploads
      - ./backup:/backup:ro                             # entrypoint reads /backup/database.sql
    healthcheck:
      # Healthy once Apache serves the login page (DB up + WordPress responding).
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:5053/wp-login.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s        # allow time for build/import on first boot

volumes:
  db_data:
